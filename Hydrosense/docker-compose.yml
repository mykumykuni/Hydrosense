services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hydrosense_app
    container_name: hydrosense_app
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hydrosense
      DB_USERNAME: hydrosense
      DB_PASSWORD: password
    depends_on:
      - db
    networks:
      - hydro
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.0
    container_name: hydrosense_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: hydrosense
      MYSQL_USER: hydrosense
      MYSQL_PASSWORD: password
    volumes:
      - db_storage:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - hydro

networks:
  hydro:
    driver: bridge

volumes:
  db_storage:
